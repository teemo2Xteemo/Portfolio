stages:
  - test
  - build
  - release
  - deploy

variables:
  AWS_DEFAULT_REGION: ap-southeast-1
  ECR_REPOSITORY: teemo/portfolio
  ECS_SERVICE: forwardport-service-8kfasmcl
  ECS_CLUSTER: genuine-eagle-4beg2s
  CONTAINER_NAME: Portfolio
  DOCKER_TLS_CERTDIR: "/certs"

cache:
  key:
    files:
      - package-lock.json
  paths:
    - .npm/

# ==========================================
# Test Stage
# ==========================================
linting:
  stage: test
  image: node:20-alpine
  before_script:
    - npm ci --cache .npm --prefer-offline
  script:
    - npm run lint

# ==========================================
# Build Stage
# ==========================================
building:
  stage: build
  image: node:20-alpine
  needs:
    - linting
  before_script:
    - npm ci --cache .npm --prefer-offline
  script:
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 week

# ==========================================
# Release (Docker Build & Push to ECR) Stage
# ==========================================
docker-release:
  stage: release
  image: docker:24.0.5
  services:
    - name: docker:24.0.5-dind
      alias: docker
  needs:
    - building
  variables:
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_VERIFY: 1
    DOCKER_CERT_PATH: "$DOCKER_TLS_CERTDIR/client"
  before_script:
    # Install AWS CLI to interact with ECR
    - apk add --no-cache aws-cli
    # Retrieve AWS Account ID dynamically
    - export AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
    - export ECR_REGISTRY="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_DEFAULT_REGION}.amazonaws.com"
    # Login to AWS ECR
    - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY
  script:
    - IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}"
    - docker build -t "$IMAGE_URI:$CI_COMMIT_SHA" -t "$IMAGE_URI:latest" .
    - docker push "$IMAGE_URI:$CI_COMMIT_SHA"
    - docker push "$IMAGE_URI:latest"
  only:
    - main

# ==========================================
# Deploy Stage (Update ECS)
# ==========================================
deploy-to-aws:
  stage: deploy
  image: amazon/aws-cli:latest
  needs:
    - docker-release
  before_script:
    # Install jq to manipulate task-definition.json
    - yum install -y jq
  script:
    - echo "Deploying application to AWS ECS..."
    - export AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
    - export ECR_REGISTRY="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_DEFAULT_REGION}.amazonaws.com"
    - IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}:${CI_COMMIT_SHA}"
    
    # Inject the new image URI into the task definition
    - jq --arg IMAGE "$IMAGE_URI" --arg NAME "$CONTAINER_NAME" '(.containerDefinitions[] | select(.name == $NAME)).image = $IMAGE' task-definition.json > task-definition-updated.json
    
    # Register the new task definition
    - TASK_DEF=$(aws ecs register-task-definition --cli-input-json file://task-definition-updated.json)
    - REVISION=$(echo $TASK_DEF | jq -r '.taskDefinition.taskDefinitionArn')
    
    # Update the ECS service with the new task definition
    - aws ecs update-service --cluster $ECS_CLUSTER --service $ECS_SERVICE --task-definition $REVISION --force-new-deployment
    - echo "Deployment initiated for $REVISION"
  only:
    - main

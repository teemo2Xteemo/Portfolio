services:
  portfolio:
    build:
      context: .
      dockerfile: Dockerfile
    image: devops-portfolio:latest
    container_name: devops-portfolio-app
    ports:
      - "8080:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/index.html"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

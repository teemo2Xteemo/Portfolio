name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  AWS_REGION: ap-southeast-1
  ECR_REPOSITORY: teemo/portfolio
  ECS_SERVICE: forwardport-service-8kfasmcl
  ECS_CLUSTER: genuine-eagle-4beg2s
  CONTAINER_NAME: Portfolio
  ECS_TASK_DEFINITION: ./task-definition.json
  # S3_BUCKET: devops-portfolio-web-bucket

jobs:
  lint-and-build:
    name: Lint, Test, and Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Lint
        run: npm run lint

      - name: Build Application
        run: npm run build

      # We upload the dist folder as an artifact to share it with the deploy jobs
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: production-build
          path: dist/
          retention-days: 1

